<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Symlinkarr{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/vendor/htmx-1.9.10.min.js"></script>
    <script src="/static/themes/theme-switcher.js" defer></script>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <nav class="sidebar">
            <a href="/" class="logo">
                &#128279; <span>Symlinkarr</span>
            </a>
            <ul class="nav">
                <li class="nav-item">
                    <a href="/" class="nav-link {% block nav_dashboard %}{% endblock %}">
                        &#128202; Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/status" class="nav-link {% block nav_status %}{% endblock %}">
                        &#128200; Status
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/health" class="nav-link {% block nav_health %}{% endblock %}">
                        &#128154; Health
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/scan" class="nav-link {% block nav_scan %}{% endblock %}">
                        &#128269; Scan
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/cleanup" class="nav-link {% block nav_cleanup %}{% endblock %}">
                        &#129529; Cleanup
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/links" class="nav-link {% block nav_links %}{% endblock %}">
                        &#128279; Links
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/config" class="nav-link {% block nav_config %}{% endblock %}">
                        &#9881;&#65039; Config
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/doctor" class="nav-link {% block nav_doctor %}{% endblock %}">
                        &#129658; Doctor
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/discover" class="nav-link {% block nav_discover %}{% endblock %}">
                        &#129517; Discover
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/backup" class="nav-link {% block nav_backup %}{% endblock %}">
                        &#128190; Backup
                    </a>
                </li>
            </ul>
        </nav>

        <!-- Main content -->
        <main class="main-content">
            <div class="main-shell">
                {% block content %}{% endblock %}

                <footer class="footer">
                    <div>
                        Symlinkarr v{{ ""|app_version }} |
                        <a href="https://github.com/LAP87/Symlinkarr" target="_blank" rel="noopener noreferrer">GitHub</a>
                    </div>
                    <div style="display:flex; align-items:center; gap:0.75rem;">
                        <button id="theme-cycle-button" type="button" class="btn btn-secondary">
                            Theme
                        </button>
                        <div class="status-indicator healthy"></div>
                    </div>
                </footer>
            </div>
        </main>
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
