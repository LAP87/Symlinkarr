<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Symlinkarr{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/alpinejs@3.13.3/dist/cdn.min.js" defer></script>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <nav class="sidebar">
            <a href="/" class="logo">
                &#128279; <span>Symlinkarr</span>
            </a>
            <ul class="nav">
                <li class="nav-item">
                    <a href="/" class="nav-link {% block nav_dashboard %}{% endblock %}">
                        &#128202; Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/status" class="nav-link {% block nav_status %}{% endblock %}">
                        &#128200; Status
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/health" class="nav-link {% block nav_health %}{% endblock %}">
                        &#128154; Health
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/scan" class="nav-link {% block nav_scan %}{% endblock %}">
                        &#128269; Scan
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/cleanup" class="nav-link {% block nav_cleanup %}{% endblock %}">
                        &#129529; Cleanup
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/links" class="nav-link {% block nav_links %}{% endblock %}">
                        &#128279; Links
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/config" class="nav-link {% block nav_config %}{% endblock %}">
                        &#9881;&#65039; Config
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/doctor" class="nav-link {% block nav_doctor %}{% endblock %}">
                        &#129658; Doctor
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/discover" class="nav-link {% block nav_discover %}{% endblock %}">
                        &#129517; Discover
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/backup" class="nav-link {% block nav_backup %}{% endblock %}">
                        &#128190; Backup
                    </a>
                </li>
            </ul>
        </nav>

        <!-- Main content -->
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div>
            Symlinkarr v0.1.0 |
            <a href="https://github.com/anthropics/claude-code" target="_blank">GitHub</a>
        </div>
        <div class="status-indicator healthy"></div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
