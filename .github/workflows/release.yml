name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-targets --locked
      - run: cargo clippy --all-targets --all-features --locked -- -D warnings
      - run: cargo fmt --all -- --check
      - uses: taiki-e/install-action@cargo-audit
      - run: cargo audit

  build:
    needs: verify
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            artifact: linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04
            artifact: linux-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package binary
        run: |
          mkdir -p dist
          package_root=symlinkarr-${{ github.ref_name }}-${{ matrix.artifact }}
          mkdir -p dist/${package_root}
          cp target/${{ matrix.target }}/release/symlinkarr dist/${package_root}/symlinkarr
          chmod +x dist/${package_root}/symlinkarr
          tar -C dist -czf dist/${package_root}.tar.gz ${package_root}
          sha256sum dist/${package_root}.tar.gz > dist/${package_root}.tar.gz.sha256
          rm -rf dist/${package_root}

      - uses: actions/upload-artifact@v4
        with:
          name: symlinkarr-${{ matrix.artifact }}
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256

  docker:
    runs-on: ubuntu-24.04
    needs: [verify, build]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4
        with:
          pattern: symlinkarr-*
          path: artifacts
          merge-multiple: true

      - name: Prepare runtime artifacts
        run: |
          rm -rf release-artifacts
          mkdir -p release-artifacts
          for archive in artifacts/*.tar.gz; do
            tar -C release-artifacts -xzf "$archive"
          done
          mv release-artifacts/*-linux-amd64 release-artifacts/linux-amd64
          mv release-artifacts/*-linux-arm64 release-artifacts/linux-arm64

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    runs-on: ubuntu-24.04
    needs: [verify, build, docker]
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: symlinkarr-*
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: artifacts/*
