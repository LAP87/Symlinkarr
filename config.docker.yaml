security:
  require_secret_provider: true
  enforce_roots: true
  enforce_secure_permissions: true

libraries:
  - name: "Movies"
    path: "/mnt/storage/plex/film"
    media_type: "movie"
    depth: 1

  - name: "Series"
    path: "/mnt/storage/plex/serier"
    media_type: "tv"
    depth: 1

  - name: "Anime"
    path: "/mnt/storage/plex/anime"
    media_type: "tv"
    content_type: "anime"
    depth: 1

sources:
  - name: "RealDebrid"
    path: "/mnt/decypharr/realdebrid/__all__"
    media_type: "auto"   # one of: auto, anime, tv, movie

db_path: "/app/data/symlinkarr.db"

daemon:
  interval_minutes: 60
  vacuum_enabled: false
  vacuum_hour_local: 4      # run once per day at or after this local hour when daemon is active

symlink:
  naming_template: "{Show} - S{season:02}E{episode:02} - {Title}.{ext}"
  dry_run: false

matching:
  mode: "strict"
  metadata_mode: "full"

api:
  tmdb_api_key: "secretfile:/app/secrets/tmdb_api_key"
  tvdb_api_key: "secretfile:/app/secrets/tvdb_api_key"
  # Metadata cache is intentionally sticky. Prefer targeted refresh/invalidation
  # when a specific title looks stale instead of forcing broad TTL churn.
  cache_ttl_hours: 87600

realdebrid:
  api_token: "secretfile:/app/secrets/realdebrid_api_token"
  torrents_page_limit: 5000
  pagination_delay_ms: 200
  max_pages: 5000

dmm:
  url: "https://debridmediamanager.com"
  # Optional advanced override if DMM changes its auth salt in the future.
  # auth_salt: "secretfile:/app/secrets/dmm_auth_salt"
  only_trusted: true
  max_search_results: 3
  max_torrent_results: 10

decypharr:
  url: "http://host.docker.internal:8282"
  poll_interval_seconds: 30
  completion_timeout_minutes: 180
  relink_timeout_minutes: 15
  max_in_flight: 3
  max_requests_per_run: 10
  queue_page_size: 100

prowlarr:
  url: "http://host.docker.internal:9696"
  api_key: "secretfile:/app/secrets/prowlarr_api_key"

bazarr:
  url: "http://host.docker.internal:6767"
  api_key: "secretfile:/app/secrets/bazarr_api_key"

tautulli:
  url: "http://host.docker.internal:8383"
  api_key: "secretfile:/app/secrets/tautulli_api_key"

# Optional: targeted Plex library refresh after Symlinkarr links or relinks content
# plex:
#   url: "http://host.docker.internal:32400"
#   token: "secretfile:/app/secrets/plex_token"
#   refresh_enabled: true
#   refresh_delay_ms: 250
#   refresh_coalesce_threshold: 8
#   max_refresh_batches_per_run: 12
#   abort_refresh_when_capped: true

# Optional: targeted Emby invalidation after Symlinkarr links or relinks content
# emby:
#   url: "http://host.docker.internal:8096"
#   api_key: "secretfile:/app/secrets/emby_api_key"
#   refresh_enabled: false
#   refresh_delay_ms: 250
#   refresh_batch_size: 64
#   max_refresh_batches_per_run: 12
#   abort_refresh_when_capped: true
#   fallback_to_library_roots_when_capped: true

# Optional: targeted Jellyfin invalidation after Symlinkarr links or relinks content
# jellyfin:
#   url: "http://host.docker.internal:8097"
#   api_key: "secretfile:/app/secrets/jellyfin_api_key"
#   refresh_enabled: false
#   refresh_delay_ms: 250
#   refresh_batch_size: 64
#   max_refresh_batches_per_run: 12
#   abort_refresh_when_capped: true
#   fallback_to_library_roots_when_capped: true

# Plex, Emby, and Jellyfin refresh backends can be enabled together.
# Refresh telemetry is aggregated in scan history and reported per backend in mutation responses.

radarr:
  url: "http://host.docker.internal:7878"
  api_key: "secretfile:/app/secrets/radarr_api_key"

sonarr:
  url: "http://host.docker.internal:8989"
  api_key: "secretfile:/app/secrets/sonarr_api_key"

sonarr_anime:
  url: "http://host.docker.internal:8990"
  api_key: "secretfile:/app/secrets/sonarr_anime_api_key"

backup:
  enabled: true
  path: "/app/data/backups"
  max_backups: 50

# Web UI (optional, for dashboard access)
web:
  enabled: false
  # Docker usually implies remote operator mode.
  # Keep Basic auth configured whenever you publish the port outside the host.
  bind_address: "0.0.0.0"
  allow_remote: true
  port: 8726
  # Basic auth protects the HTML UI and API.
  username: ""
  password: ""
  # Optional API key for scripts/automation clients.
  # This complements Basic auth; it is not a replacement for remote UI access.
  api_key: ""
